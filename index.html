<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Gift</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Gift Box Container -->
    <div id="giftContainer" class="gift-container">
        <div class="gift-box">
            <div class="gift-lid">
                <div class="ribbon-horizontal"></div>
                <div class="ribbon-vertical"></div>
                <div class="ribbon-knot"></div>
            </div>
            <div class="gift-body">
                <div class="lock-container">
                    <div class="lock-icon">🔒</div>
                    <div class="password-input-container">
                        <input type="text" id="passwordInput" placeholder="Enter password" maxlength="8">
                        <button id="unlockBtn">Unlock</button>
                    </div>
                    <div class="hint">Hint: Our special date (MM-DD-YY)</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Content Container (Hidden initially) -->
    <div id="contentContainer" class="content-container hidden">
        <!-- Video Section -->
        <section class="video-section">
            <video id="mainVideo" controls autoplay muted loop class="main-video">
                <source src="video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </section>

        <!-- Photo Gallery Section -->
        <section class="gallery-section">
            <h2 class="gallery-title">Our Memories</h2>
            <div class="photo-gallery">
                <div class="photo-item">
                    <img src="photo1.jpg" alt="Memory 1">
                    <div class="photo-caption">Our first moment</div>
                </div>
                <div class="photo-item">
                    <img src="photo2.jpg" alt="Memory 2">
                    <div class="photo-caption">Amazing times</div>
                </div>
                <div class="photo-item">
                    <img src="photo3.jpg" alt="Memory 3">
                    <div class="photo-caption">Forever together</div>
                </div>
                <div class="photo-item">
                    <img src="photo4.jpg" alt="Memory 4">
                    <div class="photo-caption">Beautiful journey</div>
                </div>
                <div class="photo-item">
                    <img src="photo5.jpg" alt="Memory 5">
                    <div class="photo-caption">Love story</div>
                </div>
                <div class="photo-item">
                    <img src="photo6.jpg" alt="Memory 6">
                    <div class="photo-caption">Happiness</div>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
